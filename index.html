<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock,Paper,Sissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>✊📄✂️</h1>
        <div class="subtitle">Rock · Paper · Scissors</div>

        <div class="scoreboard">
            <div class="score-item">👤 You <span id="humanScore">0</span></div>
            <div class="score-item">🤖 Computer <span id="computerScore">0</span></div>
        </div>

        <div class="choices-display">
            <div class="choice-box">
                <div class="label">You</div>
                <span class="emoji" id="humanChoiceDisplay">🤚</span>
            </div>
            <div class="vs-text">⚡</div>
            <div class="choice-box">
                <div class="label">Computer</div>
                <span class="emoji" id="computerChoiceDisplay">🤖</span>
            </div>
        </div>

        <div class="result" id="resultMessage">👉 Click a button!</div>

        <div class="buttons">
            <button class="btn btn-rock" data-move="rock">🪨</button>
            <button class="btn btn-paper" data-move="paper">📄</button>
            <button class="btn btn-scissors" data-move="scissors">✂️</button>
        </div>

        <button class="reset-btn" id="resetBtn">⟳ New Game</button>

        <div class="footnote">
            ⚠️ <strong>Note:</strong> The computer knows the rules because they are coded in JavaScript.
        </div>
    </div>




    <script src="script.js"></script>
</body>
</html>
